# Test Database Configuration (PostgreSQL — requires a running Postgres instance,
# e.g. `docker compose up postgres` or the docker-compose.yml postgres service)
spring.datasource.url=${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/pipeline_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipeline}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pipeline}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT test secret (must be >= 32 bytes for HS256)
jwt.secret=${JWT_SECRET:test-secret-key-please-override-in-real-envs-0000}
jwt.expiration-ms=28800000

admin.username=admin
admin.password=test-admin-password

# Logging Configuration for Tests
logging.level.root=WARN
logging.level.com.pipeline=DEBUG
