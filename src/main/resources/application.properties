# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
spring.application.name=document-pipeline

# Logging Configuration
logging.level.root=INFO
logging.level.com.pipeline=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pipeline}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipeline}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pipeline}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

# Admin user seed (see AdminUserSeeder)
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:}

# Pipeline Configuration
pipeline.stage1.threads=${PIPELINE_STAGE1_THREADS:10}
pipeline.stage2.threads=${PIPELINE_STAGE2_THREADS:3}
pipeline.stage2.queue-size=${PIPELINE_STAGE2_QUEUE_SIZE:5}
pipeline.http.timeout-sec=${PIPELINE_HTTP_TIMEOUT_SEC:5}
pipeline.content.size-limit-mb=${PIPELINE_CONTENT_SIZE_LIMIT_MB:5}

# CORS / WebSocket allowed origins (comma-separated)
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
