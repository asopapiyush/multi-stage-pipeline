# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=document-pipeline

# Logging Configuration
logging.level.root=INFO
logging.level.com.pipeline=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Database Configuration
spring.datasource.url=jdbc:sqlite:data/pipeline.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

# Pipeline Configuration
pipeline.stage1.threads=10
pipeline.stage2.threads=3
pipeline.stage2.queue-size=5
pipeline.http.timeout-sec=5
pipeline.content.size-limit-mb=5
pipeline.db.path=data/pipeline.db
